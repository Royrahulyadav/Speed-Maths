<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed-Maths App</title>
    <style>
        /* Modern App Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #game-container {
            background: #ffffff10;
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: #0f172a;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background: #7dd3fc;
            transform: scale(1.05);
        }

        #game-ui { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Speed-Maths</h1>
        <p>Test your calculation speed!</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <!-- Game Screen (Hidden initially) -->
    <div id="game-ui">
        <h2 id="question">?</h2>
        <input type="number" id="answer" placeholder="Your Answer">
        <button onclick="checkAnswer()">SUBMIT</button>
    </div>
</div>

<script>
    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        generateQuestion();
    }

    function generateQuestion() {
        // Simple example logic
        const a = Math.floor(Math.random() * 10) + 1;
        const b = Math.floor(Math.random() * 10) + 1;
        document.getElementById('question').innerText = `${a} + ${b} = ?`;
        window.correctAnswer = a + b;
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer').value;
        if (parseInt(userAns) === window.correctAnswer) {
            alert("Correct!");
            generateQuestion();
            document.getElementById('answer').value = '';
        } else {
            alert("Try again!");
        }
    }
</script>

</body>
</html>
