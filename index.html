<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speed-Maths Pro</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --accent: #38bdf8;
            --text: #ffffff;
            --text-muted: #a1a1aa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: var(--card);
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            border: 1px solid #27272a;
            box-shadow: 0 40px 60px -20px rgba(0, 0, 0, 0.6);
        }

        .score-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2rem; margin-bottom: 2rem; }
        
        #question { font-size: 4rem; font-weight: 800; margin: 1.5rem 0; letter-spacing: -0.05em; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #27272a;
            background: #000;
            color: white;
            font-size: 1.8rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }

        button {
            background: var(--accent);
            border: none;
            padding: 20px;
            font-size: 1.1rem;
            color: #000;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 24px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.97); }

        #game-ui { display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-ui">
        <div class="score-label">Current Score: <span id="score">0</span></div>
        <div id="question">11 + 8</div>
        <input type="number" id="answer" placeholder="0" autofocus onkeydown="if(event.key==='Enter') checkAnswer()">
        <button onclick="checkAnswer()">SUBMIT</button>
    </div>
</div>

<script>
    let score = 0;
    let correctAnswer;

    function nextQuestion() {
        const a = Math.floor(Math.random() * 50) + 1;
        const b = Math.floor(Math.random() * 50) + 1;
        correctAnswer = a + b;
        document.getElementById('question').innerText = `${a} + ${b}`;
        document.getElementById('answer').value = '';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const inputField = document.getElementById('answer');
        if (parseInt(inputField.value) === correctAnswer) {
            score++;
            document.getElementById('score').innerText = score;
            nextQuestion();
        } else {
            inputField.style.borderColor = '#ef4444';
            setTimeout(() => inputField.style.borderColor = '#27272a', 300);
        }
    }
    
    nextQuestion();
</script>
</body>
</html>
