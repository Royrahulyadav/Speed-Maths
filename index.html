<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Speed-Maths Pro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #09090b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            background: #18181b;
            padding: 2.5rem;
            border-radius: 24px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            border: 1px solid #27272a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { color: #38bdf8; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .stat-box { font-size: 0.9rem; color: #a1a1aa; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 1px; }
        #question { font-size: 3.5rem; font-weight: 800; margin: 1rem 0; color: #f8fafc; }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #27272a;
            background: #09090b;
            color: white;
            font-size: 1.5rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #38bdf8; }

        button {
            background: #38bdf8;
            border: none;
            padding: 16px;
            font-size: 1rem;
            color: #000;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 15px;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }
        #game-ui { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>Speed-Maths</h1>
        <p style="color: #71717a; margin-bottom: 2rem;">Professional Calculation Mode</p>
        <button onclick="startGame()">START SESSION</button>
    </div>

    <div id="game-ui">
        <div class="stat-box">Score: <span id="score">0</span></div>
        <div id="question">0 + 0</div>
        <input type="number" id="answer" placeholder="Result" inputmode="numeric" autofocus onkeydown="if(event.key==='Enter') checkAnswer()">
        <button onclick="checkAnswer()">SUBMIT ANSWER</button>
    </div>
</div>

<script>
    let score = 0;
    let correctAnswer;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        const a = Math.floor(Math.random() * 50) + 1;
        const b = Math.floor(Math.random() * 50) + 1;
        correctAnswer = a + b;
        document.getElementById('question').innerText = `${a} + ${b}`;
        document.getElementById('answer').value = '';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const inputField = document.getElementById('answer');
        const userAns = parseInt(inputField.value);
        
        if (userAns === correctAnswer) {
            score++;
            document.getElementById('score').innerText = score;
            nextQuestion();
        } else {
            inputField.style.borderColor = '#ef4444';
            setTimeout(() => inputField.style.borderColor = '#27272a', 300);
        }
    }
</script>
</body>
</html>
