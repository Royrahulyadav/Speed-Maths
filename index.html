<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Speed Maths</title>
    
    <link rel="icon" type="image/png" href="https://images.gemini.googleusercontent.com/proxy/b_S3Zl_mC8CqBf048X07HofgNisxR0e6V8D5K4kUj0j-I6MhK3WreF0o-1u4-0-Z_5cM_u7R0-Y=w1000-h1000">
    <link rel="apple-touch-icon" href="https://images.gemini.googleusercontent.com/proxy/b_S3Zl_mC8CqBf048X07HofgNisxR0e6V8D5K4kUj0j-I6MhK3WreF0o-1u4-0-Z_5cM_u7R0-Y=w1000-h1000">
    
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #1e2022 0%, #121314 100%); 
            color: #f5f5f7; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        
        .game-arena { 
            width: 100%;
            max-width: 460px; 
            background: rgba(35, 38, 41, 0.9); 
            padding: 40px 32px; 
            border-radius: 28px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7), 
                        0 0 40px rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(20px);
            text-align: center;
            position: relative;
        }

        .screen-container { display: none; }
        .screen-container.active { display: block; }

        .start-title { font-size: 38px; font-weight: 800; margin-bottom: 12px; color: #ffffff; }
        .start-desc { font-size: 14px; color: #9da3ae; margin-bottom: 35px; }

        .hud-display { 
            display: flex; 
            justify-content: space-between; 
            gap: 14px;
            margin-bottom: 40px; 
        }
        .hud-chip {
            flex: 1;
            background: #2d3135;
            padding: 12px 8px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9da3ae;
        }
        .hud-chip div { font-size: 18px; margin-top: 4px; font-weight: 800; }
        #level { color: #38bdf8; }
        #score { color: #e2e8f0; }
        #timer { color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.2); }

        .formula-window {
            background: rgba(0, 0, 0, 0.15);
            padding: 45px 15px;
            margin-bottom: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .equation { 
            font-size: 64px; 
            font-weight: 800; 
            color: #ffffff; 
            letter-spacing: -0.5px;
        }

        .options-layout { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        .btn-core { 
            background: linear-gradient(135deg, #3a3f44 0%, #2d3135 100%); 
            color: #ffffff; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 26px 14px; 
            font-size: 32px; 
            font-weight: 700; 
            border-radius: 18px; 
            cursor: pointer; 
            position: relative;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }
        .btn-core:active { 
            transform: scale(0.94); 
            background: #25282b;
        }

        .btn-start {
            background: linear-gradient(135deg, #47a86e 0%, #3b8e5c 100%);
            color: #ffffff;
            border: 1px solid #52c481;
            padding: 22px 30px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }
        .btn-start:active {
            transform: scale(0.96);
        }
        
        .btn-core.state-correct { 
            background: linear-gradient(135deg, #47a86e 0%, #3b8e5c 100%) !important; 
            border-color: #52c481 !important;
            box-shadow: 0 0 20px rgba(71, 168, 110, 0.3) !important;
        }
        .btn-core.state-wrong { 
            background: linear-gradient(135deg, #cd4b4b 0%, #b33939 100%) !important; 
            border-color: #e65c5c !important;
            box-shadow: 0 0 20px rgba(205, 75, 75, 0.3) !important;
            animation: impactShake 0.25s linear;
        }

        .fx-particle {
            position: absolute;
            background: #52c481;
            border-radius: 50%;
            pointer-events: none;
            opacity: 1;
            animation: scatter 0.5s ease-out forwards;
        }

        @keyframes impactShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
        }
        @keyframes scatter {
            to { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="game-arena" id="arena">
    
    <div id="welcome-view" class="screen-container active">
        <div class="start-title">Speed Maths</div>
        <div class="start-desc">Test your math speed calculation processing power.</div>
        <button class="btn-start" onclick="launchGameLoop()">START GAME</button>
    </div>

    <div id="play-view" class="screen-container">
        <div class="hud-display">
            <div class="hud-chip">Level <div id="level">1</div></div>
            <div class="hud-chip">Score <div id="score">0/10</div></div>
            <div class="hud-chip">Time <div id="timer">15</div></div>
        </div>
        
        <div class="formula-window">
            <div class="equation" id="equation">---</div>
        </div>
        
        <div class="options-layout">
            <button class="btn-core" onclick="evaluateSelection(this)">-</button>
            <button class="btn-core" onclick="evaluateSelection(this)">-</button>
            <button class="btn-core" onclick="evaluateSelection(this)">-</button>
            <button class="btn-core" onclick="evaluateSelection(this)">-</button>
        </div>
    </div>
</div>

<script>
    let currentLvl = 1; let pointTotal = 0; let clocksLeft = 15; let rightAnswer = 0; let activeClock;
    
    function launchGameLoop() {
        document.getElementById("welcome-view").classList.remove("active");
        document.getElementById("play-view").classList.add("active");
        triggerMatch();
    }

    function triggerMatch() { 
        pointTotal = 0; 
        clocksLeft = 15; 
        document.getElementById("score").innerText = `0/10`; 
        document.getElementById("timer").innerText = clocksLeft;
        queueNextFormula(); 
        clearInterval(activeClock); 
        activeClock = setInterval(tickDown, 1000); 
    }
    
    function tickDown() { 
        clocksLeft--; 
        document.getElementById("timer").innerText = clocksLeft; 
        if (clocksLeft <= 0) { 
            clearInterval(activeClock); 
            alert("💥 Time Expired! Returning to level 1."); 
            currentLvl = 1; 
            document.getElementById("level").innerText = currentLvl; 
            document.getElementById("play-view").classList.remove("active"); 
            document.getElementById("welcome-view").classList.add("active"); 
        } 
    }
    
    function makeRandInt(low, high) { return Math.floor(Math.random() * (high - low + 1)) + low; }
    
    function queueNextFormula() {
        let textStr = "";
        
        // 1000+ Scalable Level Generator
        if (currentLvl === 1) {
            let numA = makeRandInt(5, 20), numB = makeRandInt(1, 10);
            let sign = Math.random() > 0.5 ? '+' : '-';
            textStr = `${numA} ${sign} ${numB}`; rightAnswer = eval(textStr);
        } else if (currentLvl === 2) {
            let numA = makeRandInt(2, 6), numB = makeRandInt(2, 5), numC = makeRandInt(1, 10);
            textStr = `${numA} * ${numB} + ${numC}`; rightAnswer = eval(textStr); textStr = textStr.replace('*', '×');
        } else if (currentLvl === 3) {
            let numA = makeRandInt(2, 5), numB = makeRandInt(10, 20), numC = makeRandInt(2, 5);
            let targetDiv = numB - (numB % numC); textStr = `${numA} * (${targetDiv} / ${numC})`; rightAnswer = eval(textStr); textStr = `${numA} × (${targetDiv} ÷ ${numC})`;
        } else {
            // Infinite Scaling Rules for levels up to 1000+
            let scalar = Math.floor(currentLvl / 2);
            let numA = makeRandInt(5 + scalar, 25 + scalar);
            let numB = makeRandInt(5 + scalar, 20 + scalar);
            let sign = Math.random() > 0.5 ? '+' : '-';
            textStr = `${numA} ${sign} ${numB}`; rightAnswer = eval(textStr);
        }
        document.getElementById("equation").innerText = textStr; mapToButtons();
    }
    
    function mapToButtons() {
        let targets = document.querySelectorAll(".btn-core"), randomSpot = Math.floor(Math.random() * 4), badPool = [rightAnswer];
        for (let idx = 0; idx < 4; idx++) {
            if (idx === randomSpot) { targets[idx].innerText = rightAnswer; } 
            else { let badSeed; do { badSeed = rightAnswer + makeRandInt(-12, 12); } while (badPool.includes(badSeed) || badSeed < 0); badPool.push(badSeed); targets[idx].innerText = badSeed; }
        }
    }
    
    function burstFx(xPos, yPos) {
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.classList.add('fx-particle');
            p.style.left = xPos + 'px'; p.style.top = yPos + 'px';
            const size = makeRandInt(6, 12); p.style.width = size + 'px'; p.style.height = size + 'px';
            p.style.setProperty('--x', makeRandInt(-90, 90) + 'px'); p.style.setProperty('--y', makeRandInt(-90, 90) + 'px');
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 500);
        }
    }
    
    function evaluateSelection(clickedBtn) {
        let inputVal = parseInt(clickedBtn.innerText);
        if (inputVal === rightAnswer) {
            clickedBtn.classList.add("state-correct");
            const rect = clickedBtn.getBoundingClientRect();
            burstFx(rect.left + rect.width/2, rect.top + rect.height/2);
            
            setTimeout(() => {
                clickedBtn.classList.remove("state-correct");
                pointTotal++; clocksLeft += 4; document.getElementById("score").innerText = `${pointTotal}/10`;
                if (pointTotal >= 10) { 
                    currentLvl++; 
                    document.getElementById("level").innerText = currentLvl; 
                    alert(`🎉 Level Up! Advancing to Stage ${currentLvl}`); 
                    triggerMatch(); 
                } else { queueNextFormula(); }
            }, 250);
        } else { 
            clocksLeft -= 5; document.getElementById("timer").innerText = clocksLeft; 
            clickedBtn.classList.add("state-wrong"); 
            setTimeout(() => clickedBtn.classList.remove("state-wrong"), 250); 
        }
    }
</script>
</body>
</html>
