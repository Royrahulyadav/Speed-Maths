<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed-Maths</title>
    <!-- Replace 'favicon.png' with your icon filename if you have one -->
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Modern App Styling */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #334155);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { margin-top: 0; color: #38bdf8; }

        button {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            box-sizing: border-box;
        }

        #game-ui { display: none; }
        #question { font-size: 2.5rem; margin: 10px 0; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Speed-Maths</h1>
        <p>Master your mental math speed.</p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <!-- Game Screen -->
    <div id="game-ui">
        <div id="question">0 + 0</div>
        <input type="number" id="answer" placeholder="Enter answer" autofocus>
        <button onclick="checkAnswer()">SUBMIT</button>
    </div>
</div>

<script>
    let correctAnswer;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        generateQuestion();
    }

    function generateQuestion() {
        const a = Math.floor(Math.random() * 20) + 1;
        const b = Math.floor(Math.random() * 20) + 1;
        correctAnswer = a + b;
        document.getElementById('question').innerText = `${a} + ${b}`;
        document.getElementById('answer').value = '';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer').value;
        if (parseInt(userAns) === correctAnswer) {
            generateQuestion();
        } else {
            alert("Wrong! Try again.");
        }
    }
</script>

</body>
</html>
